services:
  db:
    image: postgres:17-alpine
    container_name: crack-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inventory_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: crack-be
    restart: on-failure
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/inventory_db?schema=public'
      JWT_SECRET: ${JWT_SECRET}
      AI_INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY}
      AI_SERVICE_URL: 'http://ai:8001'
      ALLOWED_ORIGINS: 'http://localhost:3000,http://localhost:3001'
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  ai:
    build: ./crack-ai
    container_name: crack-ai
    restart: on-failure
    ports:
      - '8001:8001'
    environment:
      DATABASE_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/inventory_db'
      JWT_SECRET: ${JWT_SECRET}
      LLM_API_KEY: ${LLM_API_KEY}
      INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY}
      BACKEND_URL: 'http://backend:8080'
      BACKEND_INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  pgdata:
