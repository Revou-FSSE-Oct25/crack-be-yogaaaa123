services:
  db:
    image: postgres:16-alpine
    container_name: crack-db
    restart: no
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: crack-be
    restart: no
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/inventory_db?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      AI_INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY}
    depends_on:
      - db

volumes:
  pgdata:
