services:
  db:
    image: postgres:16-alpine
    container_name: crack-db
    restart: no
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inventory_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: crack-be
    restart: no
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/inventory_db?schema=public'
      JWT_SECRET: ${JWT_SECRET}
      AI_INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY}
      AI_SERVICE_URL: 'http://ai:8001'
    depends_on:
      - db

  ai:
    build: ./crack-ai
    container_name: crack-ai
    restart: no
    ports:
      - '8001:8001'
    environment:
      DATABASE_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/inventory_db'
      JWT_SECRET: ${JWT_SECRET}
      LLM_API_KEY: ${LLM_API_KEY}
      INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY}
      BACKEND_URL: 'http://backend:8080'
      BACKEND_INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY}
    depends_on:
      - db
      - backend

volumes:
  pgdata:
